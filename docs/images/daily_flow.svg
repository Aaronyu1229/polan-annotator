<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" font-family="-apple-system, 'Helvetica Neue', 'PingFang TC', sans-serif">
  <defs>
    <filter id="soft3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#9bb39a"/>
    </marker>
  </defs>

  <rect width="900" height="360" fill="#fbf6ee"/>
  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="600" fill="#3a4a3e">標一筆 — 員工每天的動作</text>

  <!-- Panel 1：選音檔 -->
  <g filter="url(#soft3)">
    <rect x="30" y="80" width="195" height="200" rx="14" fill="#ffffff" stroke="#d4c8b3" stroke-width="1.5"/>
    <!-- 清單行 -->
    <rect x="50" y="105" width="155" height="22" rx="4" fill="#e6f0e1"/>
    <circle cx="60" cy="116" r="4" fill="#3a8b65"/>
    <text x="74" y="120" font-size="10" fill="#3a4a3e">Volcano Goddess_Free</text>
    <rect x="50" y="135" width="155" height="22" rx="4" fill="#fbf6ee"/>
    <circle cx="60" cy="146" r="4" fill="#d4c8b3" stroke="#9aa599" stroke-width="1"/>
    <text x="74" y="150" font-size="10" fill="#5a6b5d">Penguin Party_Bonus</text>
    <rect x="50" y="165" width="155" height="22" rx="4" fill="#fff5d6"/>
    <circle cx="60" cy="176" r="4" fill="#d4c8b3" stroke="#d4b87e" stroke-width="1.5"/>
    <text x="74" y="180" font-size="10" fill="#5a6b5d" font-weight="500">Sheep UFO_Base ←</text>
    <rect x="50" y="195" width="155" height="22" rx="4" fill="#fbf6ee"/>
    <circle cx="60" cy="206" r="4" fill="#d4c8b3" stroke="#9aa599" stroke-width="1"/>
    <text x="74" y="210" font-size="10" fill="#5a6b5d">Treasure Dragon_Free</text>
    <text x="127" y="252" text-anchor="middle" font-size="11" fill="#5a6b5d" font-weight="500">點任一檔</text>
  </g>
  <circle cx="48" cy="105" r="13" fill="#d4a5a5"/>
  <text x="48" y="111" text-anchor="middle" font-size="13" fill="#ffffff" font-weight="600">1</text>

  <!-- Panel 2：標 -->
  <g filter="url(#soft3)">
    <rect x="255" y="80" width="195" height="200" rx="14" fill="#ffffff" stroke="#d4c8b3" stroke-width="1.5"/>
    <!-- 滑桿 -->
    <text x="270" y="108" font-size="10" fill="#5a6b5d">Valence</text>
    <line x1="270" y1="120" x2="430" y2="120" stroke="#e9e0cb" stroke-width="3" stroke-linecap="round"/>
    <line x1="270" y1="120" x2="370" y2="120" stroke="#7dceaa" stroke-width="3" stroke-linecap="round"/>
    <circle cx="370" cy="120" r="6" fill="#7dceaa" stroke="#ffffff" stroke-width="2"/>
    <text x="270" y="148" font-size="10" fill="#5a6b5d">Arousal</text>
    <line x1="270" y1="160" x2="430" y2="160" stroke="#e9e0cb" stroke-width="3" stroke-linecap="round"/>
    <line x1="270" y1="160" x2="410" y2="160" stroke="#7dceaa" stroke-width="3" stroke-linecap="round"/>
    <circle cx="410" cy="160" r="6" fill="#7dceaa" stroke="#ffffff" stroke-width="2"/>
    <!-- chip -->
    <rect x="270" y="180" width="50" height="22" rx="11" fill="#e6f0e1" stroke="#7dceaa" stroke-width="1.2"/>
    <text x="295" y="195" text-anchor="middle" font-size="10" fill="#3a8b65">情緒推進</text>
    <rect x="328" y="180" width="50" height="22" rx="11" fill="#e6f0e1" stroke="#7dceaa" stroke-width="1.2"/>
    <text x="353" y="195" text-anchor="middle" font-size="10" fill="#3a8b65">氛圍營造</text>
    <rect x="270" y="210" width="50" height="22" rx="11" fill="#fbf6ee" stroke="#d4c8b3" stroke-width="1"/>
    <text x="295" y="225" text-anchor="middle" font-size="10" fill="#9aa599">慶祝</text>
    <text x="352" y="252" text-anchor="middle" font-size="11" fill="#5a6b5d" font-weight="500">拖滑桿 / 勾 chip</text>
  </g>
  <circle cx="273" cy="105" r="13" fill="#d4a5a5"/>
  <text x="273" y="111" text-anchor="middle" font-size="13" fill="#ffffff" font-weight="600">2</text>

  <!-- Panel 3：存 -->
  <g filter="url(#soft3)">
    <rect x="480" y="80" width="195" height="200" rx="14" fill="#ffffff" stroke="#d4c8b3" stroke-width="1.5"/>
    <rect x="540" y="160" width="75" height="38" rx="8" fill="#3a8b65"/>
    <text x="577" y="184" text-anchor="middle" font-size="14" fill="#ffffff" font-weight="600">Enter</text>
    <text x="577" y="220" text-anchor="middle" font-size="11" fill="#5a6b5d">儲存並下一個</text>
    <text x="577" y="252" text-anchor="middle" font-size="11" fill="#5a6b5d" font-weight="500">按 Enter</text>
    <text x="577" y="266" text-anchor="middle" font-size="9" fill="#9aa599">（或 Cmd+S 只儲存）</text>
  </g>
  <circle cx="498" cy="105" r="13" fill="#d4a5a5"/>
  <text x="498" y="111" text-anchor="middle" font-size="13" fill="#ffffff" font-weight="600">3</text>

  <!-- Panel 4：自動跳下一個 -->
  <g filter="url(#soft3)">
    <rect x="705" y="80" width="165" height="200" rx="14" fill="#ffffff" stroke="#d4c8b3" stroke-width="1.5"/>
    <circle cx="787" cy="160" r="38" fill="#e6f0e1" stroke="#7dceaA" stroke-width="2.5"/>
    <path d="M 770 160 L 786 176 L 808 148" fill="none" stroke="#3a8b65" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="787" y="222" text-anchor="middle" font-size="11" fill="#3a4a3e" font-weight="500">自動跳下一個</text>
    <text x="787" y="252" text-anchor="middle" font-size="10" fill="#7d8a82">直到全部標完</text>
  </g>
  <circle cx="722" cy="105" r="13" fill="#d4a5a5"/>
  <text x="722" y="111" text-anchor="middle" font-size="13" fill="#ffffff" font-weight="600">4</text>

  <!-- 箭頭 -->
  <line x1="225" y1="180" x2="252" y2="180" stroke="#9bb39a" stroke-width="2.5" marker-end="url(#arrow3)"/>
  <line x1="450" y1="180" x2="477" y2="180" stroke="#9bb39a" stroke-width="2.5" marker-end="url(#arrow3)"/>
  <line x1="675" y1="180" x2="702" y2="180" stroke="#9bb39a" stroke-width="2.5" marker-end="url(#arrow3)"/>

  <text x="450" y="320" text-anchor="middle" font-size="13" fill="#5a6b5d">標到一半關掉？回來會問「繼續草稿還是重新開始」</text>
</svg>
