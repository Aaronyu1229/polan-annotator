<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" font-family="-apple-system, 'Helvetica Neue', 'PingFang TC', sans-serif">
  <defs>
    <filter id="soft2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#9bb39a"/>
    </marker>
  </defs>

  <rect width="900" height="360" fill="#fbf6ee"/>

  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="600" fill="#3a4a3e">第一次登入 — 3 步驟</text>

  <!-- Panel 1：開網址 + 輸入 email -->
  <g filter="url(#soft2)">
    <rect x="40" y="80" width="240" height="200" rx="14" fill="#ffffff" stroke="#d4c8b3" stroke-width="1.5"/>
    <!-- 瀏覽器 chrome -->
    <rect x="40" y="80" width="240" height="26" rx="14" fill="#e9e0cb"/>
    <circle cx="58" cy="93" r="3" fill="#d68585"/>
    <circle cx="70" cy="93" r="3" fill="#d4b87e"/>
    <circle cx="82" cy="93" r="3" fill="#7dceaa"/>
    <!-- url bar -->
    <rect x="100" y="86" width="170" height="14" rx="7" fill="#fbf6ee"/>
    <text x="105" y="96" font-size="9" fill="#9aa599">annotate.dolcenforte.com</text>
    <!-- 內容 -->
    <text x="160" y="138" text-anchor="middle" font-size="12" fill="#5a6b5d" font-weight="500">輸入你的 email</text>
    <rect x="68" y="158" width="184" height="36" rx="8" fill="#fbf6ee" stroke="#d4c8b3" stroke-width="1.2"/>
    <text x="78" y="180" font-size="11" fill="#9aa599">polanmusic2025@gmail.com</text>
    <rect x="68" y="208" width="184" height="34" rx="8" fill="#7dceaa"/>
    <text x="160" y="229" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="500">繼續</text>
  </g>
  <circle cx="60" cy="105" r="14" fill="#d4a5a5"/>
  <text x="60" y="111" text-anchor="middle" font-size="14" fill="#ffffff" font-weight="600">1</text>

  <!-- Panel 2：收信 -->
  <g filter="url(#soft2)">
    <rect x="330" y="80" width="240" height="200" rx="14" fill="#ffffff" stroke="#d4c8b3" stroke-width="1.5"/>
    <!-- 信封 -->
    <rect x="395" y="120" width="110" height="78" rx="6" fill="#ffe8e8" stroke="#d4a5a5" stroke-width="1.5"/>
    <path d="M 395 126 L 450 165 L 505 126" fill="none" stroke="#d4a5a5" stroke-width="1.5"/>
    <!-- 數字代碼 -->
    <rect x="395" y="208" width="110" height="32" rx="6" fill="#fbf6ee" stroke="#d4c8b3" stroke-width="1"/>
    <text x="450" y="229" text-anchor="middle" font-size="16" font-weight="600" fill="#5a6b5d" letter-spacing="3">7-2-9-4-1-6</text>
    <text x="450" y="258" text-anchor="middle" font-size="11" fill="#7d8a82">信箱裡的 6 位數</text>
  </g>
  <circle cx="350" cy="105" r="14" fill="#d4a5a5"/>
  <text x="350" y="111" text-anchor="middle" font-size="14" fill="#ffffff" font-weight="600">2</text>

  <!-- Panel 3：成功 -->
  <g filter="url(#soft2)">
    <rect x="620" y="80" width="240" height="200" rx="14" fill="#ffffff" stroke="#d4c8b3" stroke-width="1.5"/>
    <!-- 大綠勾 -->
    <circle cx="740" cy="160" r="42" fill="#e6f0e1" stroke="#7dceaA" stroke-width="3"/>
    <path d="M 720 160 L 736 176 L 762 148" fill="none" stroke="#3a8b65" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="740" y="232" text-anchor="middle" font-size="13" fill="#3a4a3e" font-weight="500">進到首頁</text>
    <text x="740" y="252" text-anchor="middle" font-size="11" fill="#7d8a82">24 小時內不用再登入</text>
  </g>
  <circle cx="640" cy="105" r="14" fill="#d4a5a5"/>
  <text x="640" y="111" text-anchor="middle" font-size="14" fill="#ffffff" font-weight="600">3</text>

  <!-- 箭頭 -->
  <line x1="285" y1="180" x2="325" y2="180" stroke="#9bb39a" stroke-width="2.5" marker-end="url(#arrow2)"/>
  <line x1="575" y1="180" x2="615" y2="180" stroke="#9bb39a" stroke-width="2.5" marker-end="url(#arrow2)"/>

  <text x="450" y="320" text-anchor="middle" font-size="13" fill="#5a6b5d">第一次設好就不用再操心；換瀏覽器或無痕視窗會重新走一次這 3 步</text>
</svg>
