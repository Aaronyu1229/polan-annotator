# Phase 6 — reverse proxy for annotate.dolcenforte.com.
#
# Deploy:
#   sudo cp deploy/nginx/annotate.dolcenforte.com.conf \
#       /etc/nginx/sites-available/annotate.dolcenforte.com
#   sudo ln -s /etc/nginx/sites-available/annotate.dolcenforte.com \
#              /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d annotate.dolcenforte.com
#   sudo nginx -t && sudo systemctl reload nginx
#
# Topology assumptions:
#   - This file runs on the host nginx (the VPS already has one for n8n etc).
#   - The FastAPI container does NOT publish a host port; we proxy to its
#     bridge IP via 127.0.0.1 + docker's userland-proxy. If userland-proxy is
#     disabled, change `proxy_pass` to the container's bridge IP, or move
#     nginx into the same compose network and use `proxy_pass http://app:8000;`.

# ───── HTTP → HTTPS redirect ─────
server {
    listen 80;
    listen [::]:80;
    server_name annotate.dolcenforte.com;

    # certbot will inject the ACME http-01 location here on first run; keep
    # the redirect as the catch-all.
    location / {
        return 301 https://$host$request_uri;
    }
}

# ───── HTTPS reverse proxy ─────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name annotate.dolcenforte.com;

    # certbot writes these paths after `certbot --nginx -d annotate.dolcenforte.com`.
    ssl_certificate     /etc/letsencrypt/live/annotate.dolcenforte.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/annotate.dolcenforte.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 100 MB caps audio uploads from the admin upload UI.
    client_max_body_size 100M;

    # Force HTTPS for one year incl. subdomains. Drop `preload` until you're
    # certain you want to be on the HSTS preload list.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    access_log /var/log/nginx/annotate.dolcenforte.com.access.log;
    error_log  /var/log/nginx/annotate.dolcenforte.com.error.log warn;

    location / {
        # If you instead run nginx inside the compose network, swap the line
        # below for: proxy_pass http://app:8000;
        proxy_pass http://127.0.0.1:8000;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        # librosa cold-start on first audio request can be slow — give it room.
        proxy_connect_timeout 30s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;

        # Disable buffering for streaming audio responses.
        proxy_buffering off;
        proxy_request_buffering off;
    }
}
