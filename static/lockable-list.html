<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>待快速確認清單 — 珀瀾標註工具</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-slate-100">
  <main class="max-w-5xl mx-auto p-6">
    <header class="mb-6 flex items-baseline justify-between">
      <div>
        <h1 class="text-2xl font-semibold">✓ 待快速確認清單</h1>
        <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">
          creator 與 industry 已對齊（Amber–yyslin gap ≤ 0.20）的音檔。
          快速確認 = 以 creator 初標值寫入仲裁紀錄。按 gap 由小到大排。
        </p>
      </div>
      <a href="/dashboard" class="text-sm text-slate-500 hover:text-amber-500">← Dashboard</a>
    </header>

    <section class="bg-white dark:bg-slate-800 rounded border border-slate-200 dark:border-slate-700 overflow-hidden">
      <div class="p-3 flex items-center justify-between border-b border-slate-200 dark:border-slate-700">
        <div id="meta" class="text-xs text-slate-500 dark:text-slate-400">載入中…</div>
        <div class="flex items-center gap-2">
          <label class="text-xs text-slate-500 flex items-center gap-1">
            <input type="checkbox" id="select-all"> 全選
          </label>
          <button id="confirm-btn"
            class="px-3 py-1.5 text-sm font-medium rounded bg-emerald-600 text-white hover:bg-emerald-700 disabled:opacity-40"
            disabled>✓ 確認選取</button>
        </div>
      </div>
      <table class="w-full text-sm">
        <thead class="bg-slate-100 dark:bg-slate-900/70 text-xs text-slate-600 dark:text-slate-400 uppercase tracking-wide">
          <tr>
            <th class="p-3 w-8"></th>
            <th class="text-left p-3 font-medium">遊戲 / 段落</th>
            <th class="text-left p-3 font-medium">標註員</th>
            <th class="text-right p-3 font-medium">Amber–yyslin gap</th>
            <th class="text-left p-3 font-medium">維度</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </section>

    <footer class="mt-4 text-xs text-slate-500 dark:text-slate-500 space-y-1">
      <p>💡 快速確認後該檔所有欄位以 creator 初標值寫入 Arbitration(path=fast)，狀態變 Creator Ready。</p>
      <p>🔍 標「需完整仲裁」的列是盲審抽中（~12.5%），須到仲裁頁逐維確認並寫 Notes。</p>
    </footer>
  </main>

  <script type="module" src="/static/auth.js"></script>
  <script type="module" src="/static/lockable-list.js"></script>
</body>
</html>
