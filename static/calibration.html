<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>校準訓練 — 珀瀾標註工具</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-slate-100">
  <main class="max-w-5xl mx-auto p-8">
    <header class="mb-6 flex items-baseline justify-between">
      <div>
        <h1 class="text-2xl font-semibold">🎯 校準訓練</h1>
        <p class="text-slate-500 dark:text-slate-400 text-sm mt-1">
          請將以下檔案標註一次。提交後會看到你和 Amber 的分數比對，幫助你校準對每個維度的判讀。
        </p>
      </div>
      <div class="text-sm text-slate-600 dark:text-slate-400 flex items-center gap-2">
        <label for="annotator-input" class="font-medium text-slate-900 dark:text-slate-100">你的標註員 id：</label>
        <input
          id="annotator-input"
          type="text"
          class="px-2 py-1 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 border border-slate-300 dark:border-slate-700 rounded text-sm focus:outline-none focus:border-amber-500"
          placeholder="例如 bob">
      </div>
    </header>

    <div class="mb-4 px-3 py-2 bg-amber-50 dark:bg-amber-900/30 border-l-4 border-amber-500 text-sm text-amber-900 dark:text-amber-200 rounded">
      校準參考標註員：<strong>amber</strong>。下方是 amber 已 is_complete 標過、你還沒標的音檔。
    </div>

    <div id="status" class="text-slate-500 dark:text-slate-400 text-sm mb-4">輸入你的 id 後載入清單…</div>

    <div class="bg-white dark:bg-slate-800 shadow-sm rounded-md overflow-hidden">
      <table class="w-full text-sm">
        <thead class="bg-slate-100 text-slate-600 dark:bg-slate-900/70 dark:text-slate-400 text-xs uppercase tracking-wide">
          <tr>
            <th class="text-left p-3 font-medium">遊戲 / 段落</th>
            <th class="text-left p-3 font-medium">類型</th>
            <th class="text-right p-3 font-medium w-24">時長</th>
          </tr>
        </thead>
        <tbody id="queue-list"></tbody>
      </table>
    </div>

    <p class="mt-4 text-xs text-slate-500 dark:text-slate-500">
      <a href="/" class="hover:text-amber-500">← 回主頁</a>　/
      <a href="/dashboard" class="hover:text-amber-500">看 Dashboard →</a>
    </p>
  </main>

  <script type="module" src="/static/calibration.js"></script>
</body>
</html>
